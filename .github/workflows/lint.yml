name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  selene:
    name: selene
    runs-on: ubuntu-latest
    env:
      SELENE_VERSION: 0.30.1
    steps:
      - uses: actions/checkout@v4
      - name: Install selene
        run: |
          curl -fsSL "https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-linux.zip" -o selene.zip
          unzip -q selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/
      - name: Run selene
        run: selene --display-style=quiet .
